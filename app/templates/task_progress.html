<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>任务进度 - {{ task_id }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
      <a class="navbar-brand" href="{{ url_for('main.index') }}">AI 漏洞扫描助手</a>
    </div>
  </nav>

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="card shadow-sm">
          <div class="card-header bg-primary text-white">
            <h5 class="mb-0">任务进度</h5>
          </div>
          <div class="card-body">
            <p class="mb-1"><strong>任务 ID：</strong><span id="taskId">{{ task_id }}</span></p>
            <p class="mb-3"><strong>目标：</strong><span id="taskDomain">加载中...</span></p>

            <div class="progress mb-3" style="height: 1.5rem;">
              <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar"
                   style="width: 10%;">初始化中...</div>
            </div>

            <p id="statusText" class="lead">正在查询任务状态...</p>
            <div id="alertContainer" class="mt-3"></div>

            <div class="d-flex justify-content-end mt-3">
              <a href="{{ url_for('main.index') }}" class="btn btn-outline-secondary me-2">返回首页</a>
              <button id="viewResultBtn" type="button" class="btn btn-success" disabled>查看扫描结果</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    (function () {
      const taskId = document.getElementById('taskId').textContent;
      const taskDomainEl = document.getElementById('taskDomain');
      const progressBar = document.getElementById('progressBar');
      const statusText = document.getElementById('statusText');
      const alertContainer = document.getElementById('alertContainer');
      const viewResultBtn = document.getElementById('viewResultBtn');

      function showAlert(message, type) {
        alertContainer.innerHTML = `
          <div class="alert alert-${type} alert-dismissible fade show" role="alert">
            ${message}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>
        `;
      }

      function updateProgress(status, text) {
        let percent = 10;
        if (status === 'pending') percent = 15;
        else if (status === 'scanning') percent = 40;
        else if (status === 'analyzing') percent = 75;
        else if (status === 'success') percent = 100;
        else if (status === 'failed') percent = 100;

        progressBar.style.width = percent + '%';
        progressBar.textContent = text;

        if (status === 'success') {
          progressBar.classList.remove('bg-danger');
          progressBar.classList.add('bg-success');
        } else if (status === 'failed') {
          progressBar.classList.remove('bg-success');
          progressBar.classList.add('bg-danger');
        }
      }

      async function pollStatus() {
        try {
          const resp = await fetch(`/api/tasks/${taskId}/status`);
          const data = await resp.json();
          if (!data.success) {
            const msg = (data.error && data.error.message) || '任务状态查询失败。';
            showAlert(msg, 'danger');
            statusText.textContent = msg;
            updateProgress('failed', '任务失败');
            return;
          }
          const info = data.data;
          taskDomainEl.textContent = info.domain;
          statusText.textContent = info.progress_text;
          updateProgress(info.status, info.progress_text);

          if (info.status === 'success') {
            viewResultBtn.disabled = false;
          } else if (info.status === 'failed') {
            showAlert('任务执行失败，请稍后重试或查看日志。', 'danger');
          } else {
            setTimeout(pollStatus, 3000);
          }
        } catch (e) {
          console.error(e);
          showAlert('网络异常，无法获取任务状态。', 'danger');
          setTimeout(pollStatus, 5000);
        }
      }

      viewResultBtn.addEventListener('click', function () {
        window.location.href = `/tasks/${taskId}/result`;
      });

      pollStatus();
    })();
  </script>
</body>
</html>
