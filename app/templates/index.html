<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>公网授权靶场渗透测试辅助系统</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
      <a class="navbar-brand" href="{{ url_for('main.index') }}">AI 漏洞扫描助手</a>
    </div>
  </nav>

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="card shadow-sm">
          <div class="card-header bg-primary text-white">
            <h5 class="mb-0">提交新的扫描任务</h5>
          </div>
          <div class="card-body">
            <form id="task-form">
              <div class="mb-3">
                <label for="targetDomain" class="form-label">公网授权靶场目标（域名/IP+端口）</label>
                <input
                  type="text"
                  class="form-control"
                  id="targetDomain"
                  name="domain"
                  placeholder="例如：buuctf.cn 或 buuctf.cn:8080"
                  required
                />
                <div class="form-text">
                  仅允许已授权的公网靶场目标，例如 BUUCTF、好靶场等，请勿填写真实生产环境系统。
                </div>
              </div>
              <div class="d-flex justify-content-end">
                <button type="button" class="btn btn-secondary me-2" onclick="document.getElementById('task-form').reset();">
                  重置
                </button>
                <button type="button" class="btn btn-danger" id="submitBtn" data-bs-toggle="modal" data-bs-target="#complianceModal">
                  提交并开始扫描
                </button>
              </div>
            </form>
            <div id="alertContainer" class="mt-3"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  {# 合规声明弹窗 #}
  {% include "compliance_modal.html" %}

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    (function () {
      const form = document.getElementById('task-form');
      const alertContainer = document.getElementById('alertContainer');
      const confirmBtn = document.getElementById('complianceConfirmBtn');

      function showAlert(message, type) {
        alertContainer.innerHTML = `
          <div class="alert alert-${type} alert-dismissible fade show" role="alert">
            ${message}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>
        `;
      }

      async function submitTask() {
        const domain = form.domain.value.trim();
        if (!domain) {
          showAlert('目标地址不能为空。', 'warning');
          return;
        }

        // 关闭弹窗
        const modalEl = document.getElementById('complianceModal');
        const modalInstance = bootstrap.Modal.getInstance(modalEl);
        modalInstance.hide();

        try {
          const resp = await fetch('/api/tasks', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ domain: domain, user_confirmed: true }),
          });
          const data = await resp.json();
          if (!data.success) {
            const msg = (data.error && data.error.message) || '任务创建失败。';
            showAlert(msg, 'danger');
            return;
          }
          const taskId = data.data.task_id;
          window.location.href = `/tasks/${taskId}/progress`;
        } catch (e) {
          console.error(e);
          showAlert('网络异常，任务创建失败。', 'danger');
        }
      }

      if (confirmBtn) {
        confirmBtn.addEventListener('click', submitTask);
      }
    })();
  </script>
</body>
</html>
