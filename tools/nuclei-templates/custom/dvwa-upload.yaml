id: DVWA-Upload-Auth-Detect

info:
  name: DVWA - File Upload (upload) - Detection
  author: ai_vuln_scanner
  severity: high
  description: |
    登录 DVWA、设置安全等级为 low，然后验证 File Upload（upload）模块页面的漏洞提示文本。
  tags: dvwa,upload,file-upload,detect

variables:
  dvwa_cookie: ""

requests:
  - method: GET
    path:
      - "{{BaseURL}}/vulnerabilities/upload/"
    headers:
      Cookie: "{{dvwa_cookie}}"
    matchers:
      - type: word
        part: body
        words:
          - "File Upload"

