id: DVWA-SQLI-Blind-Auth-Detect

info:
  name: DVWA - SQL Injection (Blind) - Detection
  author: ai_vuln_scanner
  severity: high
  description: |
    登录 DVWA、设置安全等级为 low，然后验证 SQL Injection (Blind) 模块页面的漏洞提示文本。
  tags: dvwa,sqli,blind,detect

variables:
  dvwa_cookie: ""

requests:
  - method: GET
    path:
      - "{{BaseURL}}/vulnerabilities/sqli_blind/"
    headers:
      Cookie: "{{dvwa_cookie}}"
    matchers:
      - type: word
        part: body
        words:
          - "SQL Injection (Blind)"

