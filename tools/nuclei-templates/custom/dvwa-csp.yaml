id: DVWA-CSP-Auth-Detect

info:
  name: DVWA - CSP Bypass (csp) - Detection
  author: ai_vuln_scanner
  severity: low
  description: |
    登录 DVWA、设置安全等级为 low，然后验证 CSP Bypass（csp）模块页面的漏洞提示文本。
  tags: dvwa,csp,detect

variables:
  dvwa_cookie: ""

requests:
  - method: GET
    path:
      - "{{BaseURL}}/vulnerabilities/csp/"
    headers:
      Cookie: "{{dvwa_cookie}}"
    matchers:
      - type: word
        part: body
        words:
          - "CSP Bypass"

